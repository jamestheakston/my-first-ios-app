name: Generate Free iOS Installer

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # This sets up a minimal framework structure for GitHub's compiler
      - name: Initialize App Structure
        run: |
          mkdir -p MyCloudApp.xcodeproj
          echo '{"archiveVersion":1,"objectVersion":56,"objects":{},"rootObject":""}' > MyCloudApp.xcodeproj/project.pbxproj

      # Compiles the SwiftUI code strictly targeting physical arm64 iPhone architecture
      - name: Compile Code
        run: |
          mkdir -p Payload
          xcrun -sdk iphoneos swiftc ContentView.swift \
            -target arm64-apple-ios15.0 \
            -o Payload/MyCloudApp
          zip -r MyCloudApp.ipa Payload

      # Saves the ready-to-install installer package as a download
      - name: Save Installer
        uses: actions/upload-artifact@v4
        with:
          name: MyUnsignedApp
          path: MyCloudApp.ipa
